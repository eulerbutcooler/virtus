services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: virtus
      POSTGRES_PASSWORD: virtus
      POSTGRES_DB: virtusdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virtus -d virtusdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/app/api"]
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=virtus
      - DB_PASSWORD=virtus_secret
      - DB_NAME=virtus
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=localjwtkeyhai
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_123}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_123}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/app/worker"]
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=virtus
      - DB_PASSWORD=virtus_secret
      - DB_NAME=virtus
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=supersecret_local_jwt_key
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_123}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
